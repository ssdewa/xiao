name: xiaosa Updater
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时检查一次更新
  workflow_dispatch:        # 允许手动触发

# ========== 关键：添加写入权限 ==========
permissions:
  contents: write

jobs:
  update-tvbox-files:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史记录，便于提交
    
    - name: Check for updates by MD5
      id: check-update
      run: |
        # API 接口地址
        API_URL="https://pizazz.s3.bitiful.net/single.json"
        USER_AGENT="okHttp/Mod-1.5.0.0"
        
        # 获取最新文件信息
        echo "正在获取文件信息..."
        file_info=$(curl -s -H "User-Agent: $USER_AGENT" "$API_URL")
        
        # 从JSON中提取下载URL
        download_url=$(echo "$file_info" | jq -r '.[] | select(.name=="本地包") | .list[1].url')
        
        # 检查API响应
        if [ -z "$download_url" ] || [ "$download_url" = "null" ] || [ "$download_url" = "" ]; then
          echo "::error::无法获取下载地址"
          echo "API响应: $file_info"
          exit 1
        fi
        
        echo "下载地址: $download_url"
        
        # 获取远程文件的MD5值
        echo "正在计算远程文件MD5..."
        remote_md5=$(curl -s -L -H "User-Agent: $USER_AGENT" "$download_url" | md5sum | cut -d' ' -f1)
        
        if [ -z "$remote_md5" ]; then
          echo "::error::无法计算远程文件MD5"
          exit 1
        fi
        
        echo "远程文件MD5: $remote_md5"
        
        # 读取本地存储的MD5值
        current_md5=""
        if [ -f "xs_md5.txt" ]; then
          current_md5=$(cat "xs_md5.txt")
          echo "本地MD5: $current_md5"
        else
          echo "本地MD5文件不存在，将进行首次更新"
        fi
        
        # 对比MD5值
        if [ "$current_md5" != "$remote_md5" ]; then
          echo "::notice::检测到新版本 (MD5: $remote_md5)"
          echo "download_url=$download_url" >> $GITHUB_OUTPUT
          echo "remote_md5=$remote_md5" >> $GITHUB_OUTPUT
          echo "update_available=true" >> $GITHUB_OUTPUT
        else
          echo "::notice::当前已是最新版本 (MD5: $current_md5)"
          echo "update_available=false" >> $GITHUB_OUTPUT
        fi

    - name: Download and extract update
      if: steps.check-update.outputs.update_available == 'true'
      run: |
        download_url="${{ steps.check-update.outputs.download_url }}"
        remote_md5="${{ steps.check-update.outputs.remote_md5 }}"
        
        # ========== 删除旧的ZIP文件 ==========
        echo "正在清理旧的ZIP文件..."
        if [ -f "单线路.zip" ]; then
          rm -f "单线路.zip"
          echo "✅ 已删除旧的 单线路.zip"
        fi
        
        # 也清理其他可能的ZIP文件
        find . -maxdepth 1 -name "*.zip" -type f -delete 2>/dev/null || true
        echo "✅ 已清理所有ZIP文件"
        
        echo "正在下载更新..."
        echo "下载地址: $download_url"
        
        # 下载ZIP文件，命名为 单线路.zip
        curl -L -H "User-Agent: okHttp/Mod-1.5.0.0" -o "单线路.zip" "$download_url"
        
        # 检查文件是否下载成功
        if [ ! -s "单线路.zip" ]; then
          echo "::error::下载的文件为空！"
          exit 1
        fi
        
        # 验证下载文件的MD5
        downloaded_md5=$(md5sum "单线路.zip" | cut -d' ' -f1)
        echo "下载文件MD5: $downloaded_md5"
        echo "预期MD5: $remote_md5"
        
        if [ "$downloaded_md5" != "$remote_md5" ]; then
          echo "::error::MD5验证失败，文件可能损坏"
          rm -f "单线路.zip"
          exit 1
        fi
        echo "✅ MD5验证通过"
        
        # 检查文件大小
        file_size=$(stat -c%s "单线路.zip" 2>/dev/null || stat -f%z "单线路.zip" 2>/dev/null || echo "0")
        echo "文件大小: $file_size 字节"
        
        if [ "$file_size" -lt 1000 ]; then
          echo "::warning::文件太小，可能不是有效的ZIP文件"
          cat "单线路.zip"
          rm -f "单线路.zip"
          exit 1
        fi
        
        # 解压ZIP文件
        echo "正在解压ZIP文件..."
        unzip -o -q "单线路.zip" -d .
        
        if [ $? -eq 0 ]; then
          echo "::notice::ZIP文件解压完成！"
        else
          echo "::error::解压失败"
          rm -f "单线路.zip"
          exit 1
        fi
        
        # ========== 保留新的ZIP文件（不删除） ==========
        echo "✅ 已保留新的 单线路.zip 文件"
        
        # 更新MD5记录
        echo "$remote_md5" > "xs_md5.txt"
        echo "✅ MD5记录已更新: $remote_md5"

    - name: Filter API JSON with Blacklist
      if: steps.check-update.outputs.update_available == 'true'
      run: |
        echo "=== 开始过滤黑名单内容 ==="
        
        # 定义路径（根据实际解压后的路径调整）
        API_JSON="TVBoxOSC/tvbox/api.json"
        XYQ_JSON="TVBoxOSC/tvbox/a.json"
        
        # 如果默认路径不存在，尝试查找
        if [ ! -f "$API_JSON" ]; then
          echo "⚠️ 默认路径不存在: $API_JSON"
          echo "正在查找 api.json 文件..."
          found_api=$(find . -name "api.json" -type f 2>/dev/null | head -1)
          if [ -n "$found_api" ]; then
            API_JSON="$found_api"
            XYQ_JSON="$(dirname "$found_api")/a.json"
            echo "✅ 找到 api.json: $API_JSON"
          else
            echo "❌ 错误: 找不到 api.json 文件"
            echo "当前目录结构:"
            ls -la
            find . -type f -name "*.json" 2>/dev/null | head -20
            exit 1
          fi
        fi
        
        # 黑名单数组
        BLACKLIST='[
          "指南", "百度网盘", "夸克网盘", "UC网盘", "csp_TgDouBan", "csp_TgSearch", "豆瓣",
          "预告", "本地", "配置中心", "小斑快映", "移动", "123", "玩偶哥哥", "木偶", "玩偶", "快映", "夸克", "清影", "盘它", "人人", "即刻", "UC", "蜡笔",
          "至臻", "多多", "欧哥", "二小", "大玩", "虎斑", "闪电", "奥秘", "团长", "雷鲸", "海绵",
          "夸父", "趣盘", "盘库", "双星", "懒盘", "百酷", "校长", "天堂", "人人电影网", "爱搜",
          "糖果", "聚搜", "米搜", "人人分享站", "全盘", "夸克盘搜", "哆啦新番社", "56动漫", "NT动漫",
          "Anime1", "曼波动漫", "稀饭动漫", "咕咕动漫", "米饭动漫", "次元动漫", "派对动漫", "丫丫",
          "黑猫动漫", "樱花动漫", "巴士动漫", "好看动漫", "奇米动漫", "怡萱动漫", "花子动漫", "动画片",
          "路漫漫", "动漫岛", "去看吧", "爱弹幕", "异世界", "阿里云盘", "夸克云盘", "百度云盘",
          "短剧合集", "短剧大全", "AList", "网络直播", "88看球", "哔哩合集", "哔哩哔哩演唱会",
          "哔哩哔哩听书", "哔哩哔哩相声", "哔哩哔哩小品", "哔哩哔哩戏曲", "小学课堂",
          "初中课堂", "高中教育", "急救教学", "养生堂", "版本信息", "星辰影视", "天翼", "兄弟", "混合", "鬼鬼", "盘搜",
          "UC云盘", "韩剧看看", "小镇影视", "面包影视", "永乐影视", "剧圈影视", "来看影视",
          "采集之王", "1905", "漫国动漫", "丫丫动漫", "方舟动漫", "元咲动漫", "番薯动漫", "爱动漫", "咖啡体育", "古哥",
          "酷乐", "919体育", "爱听音乐", "六月听书", "呦呦DJ", "戏曲多多", "哔哩直播", "哔哩视频", "爱奇艺", "芒果视频", "优酷视频", "腾讯视频", "九七", "瓜子体育", "球通体育", "世界听书", "蜻蜓FM", "轮回DJ", "高中课堂"
        ]'
        
        # 检查jq是否安装
        if ! command -v jq &> /dev/null; then
          echo "::error::jq 未安装，正在安装..."
          sudo apt-get update && sudo apt-get install -y jq
        fi
        
        # 统计原始站点数
        original_count=$(jq '.sites | length' "$API_JSON" 2>/dev/null || echo "0")
        echo "📊 原始站点数: $original_count"
        
        if [ "$original_count" -eq 0 ]; then
          echo "❌ 错误: api.json 中没有站点数据"
          exit 1
        fi
        
        # 执行过滤，先过滤黑名单
        echo "🔍 正在过滤黑名单内容..."
        if ! jq --argjson blacklist "$BLACKLIST" \
               '.sites |= map(select(
                 (.key | IN($blacklist[])) == false and
                 (.name | IN($blacklist[])) == false
               ))' "$API_JSON" > "$XYQ_JSON.tmp" 2>/dev/null; then
          echo "❌ JSON处理失败"
          exit 1
        fi
        
        # ========== 修改生成的 a.json 中的目标条目 ==========
        echo "=== 修改 a.json 中的目标条目 ==="
        echo "正在将 key='少儿教育' 的 searchable 和 quickSearch 设置为 1..."
        
        # 修改临时文件中的目标条目
        jq --indent 4 \
           '.sites |= map(if .key == "少儿教育" then .searchable = 1 | .quickSearch = 1 else . end)' \
           "$XYQ_JSON.tmp" > "$XYQ_JSON.tmp.modified" && mv "$XYQ_JSON.tmp.modified" "$XYQ_JSON.tmp"
        
        echo "✅ 目标条目已修改: searchable=1, quickSearch=1"
        # ====================================================
        
        # 统计过滤后站点数
        filtered_count=$(jq '.sites | length' "$XYQ_JSON.tmp" 2>/dev/null || echo "0")
        removed_count=$((original_count - filtered_count))
        
        echo "📊 过滤后站点数: $filtered_count"
        echo "📊 已移除站点数: $removed_count"
        
        # 检查过滤后是否有内容
        if [ "$filtered_count" -eq 0 ]; then
          echo "⚠️ 过滤后无有效内容，使用原始api.json"
          # 如果要使用原始api.json，同时也要修改其中的目标条目
          jq --indent 4 \
             '.sites |= map(if .key == "少儿教育" then .searchable = 1 | .quickSearch = 1 else . end)' \
             "$API_JSON" > "$XYQ_JSON"
        else
          # 格式化输出并保存
          jq --indent 4 '.' "$XYQ_JSON.tmp" > "$XYQ_JSON" 2>/dev/null
          echo "✅ a.json 生成成功"
        fi
        
        # 清理临时文件
        rm -f "$XYQ_JSON.tmp"
        
        # 显示过滤示例
        if [ $removed_count -gt 0 ] && [ $removed_count -le 50 ]; then
          echo ""
          echo "🚫 已过滤的站点示例（前5个）:"
          jq --argjson blacklist "$BLACKLIST" \
             '.sites[] | select(
               (.key | IN($blacklist[])) or
               (.name | IN($blacklist[]))
             ) | "  - \(.key): \(.name)"' \
             "$API_JSON" 2>/dev/null | head -5 || echo "  无法列出"
        fi
        
        # 验证生成的a.json
        if jq . "$XYQ_JSON" > /dev/null 2>&1; then
          echo ""
          echo "✅ 黑名单过滤完成！"
          echo "📁 文件大小:"
          ls -lh "$API_JSON" "$XYQ_JSON" 2>/dev/null || echo "  文件信息获取失败"
        else
          echo "❌ a.json 格式验证失败"
          exit 1
        fi

    - name: Commit changes
      if: steps.check-update.outputs.update_available == 'true'
      run: |
        # 配置Git用户
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加所有更改
        git add .
        
        # 检查是否有变更
        if git diff --staged --quiet; then
          echo "::notice::没有文件变更，跳过提交"
          exit 0
        fi
        
        # 提交并推送
        git commit -m "自动更新TVBox文件 (MD5: ${{ steps.check-update.outputs.remote_md5 }})"
        git push
        
        echo "::notice::提交成功！"
